services:

  # ── nginx — frontend + API proxy ──────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: 4db_web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - 4db_net

  # ── Node.js API ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: 4db_api
    restart: unless-stopped
    expose:
      - "7010"
    environment:
      PORT: 7010
      MYSQL_HOST:     mysql
      MYSQL_PORT:     3306
      MYSQL_USER:     appuser
      MYSQL_PASSWORD: apppassword
      MYSQL_DATABASE: appdb
      PG_HOST:        postgres
      PG_PORT:        5432
      PG_USER:        appuser
      PG_PASSWORD:    apppassword
      PG_DATABASE:    appdb
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      REDIS_PASSWORD: apppassword
      MONGO_URI:      mongodb://appuser:apppassword@mongo:27017/appdb?authSource=admin
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - 4db_net

  # ── MySQL 8 ───────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: 4db_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE:      appdb
      MYSQL_USER:          appuser
      MYSQL_PASSWORD:      apppassword
    ports:
      - "3307:3306"   # host:container — avoids conflict with local MySQL
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - 4db_net

  # ── PostgreSQL 16 ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: 4db_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB:       appdb
    ports:
      - "5433:5432"   # host:container — avoids conflict with local PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - 4db_net

  # ── Redis 7 ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: 4db_redis
    restart: unless-stopped
    command: redis-server --requirepass apppassword --appendonly yes
    ports:
      - "6380:6379"   # host:container — avoids conflict with local Redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "apppassword", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - 4db_net

  # ── MongoDB 7 ─────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: 4db_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: appuser
      MONGO_INITDB_ROOT_PASSWORD: apppassword
      MONGO_INITDB_DATABASE:      appdb
    ports:
      - "27018:27017"  # host:container — avoids conflict with local MongoDB
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok", "--username", "appuser", "--password", "apppassword", "--authenticationDatabase", "admin"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - 4db_net

volumes:
  mysql_data:
  postgres_data:
  redis_data:
  mongo_data:

networks:
  4db_net:
    driver: bridge